openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: stocks
    description: Stock data operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /stocks/history:
    get:
      operationId: getStockHistory
      tags: [stocks]
      summary: Get stock historical data
      description: Fetch OHLCV historical data for a stock via Yahoo Finance
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
          description: Stock ticker symbol (e.g. AAPL, TSLA, 2330.TW)
        - name: period
          in: query
          required: true
          schema:
            type: string
            enum: [1d, max]
          description: Time range - "1d" for today, "max" for full history
        - name: interval
          in: query
          required: true
          schema:
            type: string
            enum: [1m, 5m, 15m, 1h, 1d]
          description: Data interval/resolution
      responses:
        "200":
          description: Historical data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockHistoryResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stocks/info:
    get:
      operationId: getStockInfo
      tags: [stocks]
      summary: Get stock metadata/info
      description: Fetch basic metadata for a stock symbol
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
          description: Stock ticker symbol
      responses:
        "200":
          description: Stock info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockInfo"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stocks/batch-summary:
    post:
      operationId: batchStockSummary
      tags: [stocks]
      summary: Batch today summary for a list of symbols
      description: >
        For each symbol, fetches today's 1m intraday bars (including pre/post market),
        computes regular-session VWAP, % of minutes above VWAP, latest price,
        after-hours price, and daily OHLCV. Uses US/Eastern timezone for session logic.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchSummaryRequest"
      responses:
        "200":
          description: Batch summary results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchSummaryResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    OHLCVBar:
      type: object
      properties:
        date:
          type: string
          description: ISO timestamp
        open:
          type: ["number", "null"]
        high:
          type: ["number", "null"]
        low:
          type: ["number", "null"]
        close:
          type: ["number", "null"]
        volume:
          type: ["integer", "null"]
      required:
        - date
    StockHistoryResult:
      type: object
      properties:
        symbol:
          type: string
        period:
          type: string
        interval:
          type: string
        rowCount:
          type: integer
        data:
          type: array
          items:
            $ref: "#/components/schemas/OHLCVBar"
        fetchedAt:
          type: string
          description: ISO timestamp when data was fetched
      required:
        - symbol
        - period
        - interval
        - rowCount
        - data
        - fetchedAt
    StockInfo:
      type: object
      properties:
        symbol:
          type: string
        shortName:
          type: ["string", "null"]
        longName:
          type: ["string", "null"]
        currency:
          type: ["string", "null"]
        exchange:
          type: ["string", "null"]
        regularMarketPrice:
          type: ["number", "null"]
        regularMarketChangePercent:
          type: ["number", "null"]
        marketCap:
          type: ["number", "null"]
        fiftyTwoWeekHigh:
          type: ["number", "null"]
        fiftyTwoWeekLow:
          type: ["number", "null"]
      required:
        - symbol
    BatchSummaryRequest:
      type: object
      properties:
        symbols:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 100
          description: List of ticker symbols to query
        date:
          type: ["string", "null"]
          description: Trade date YYYY-MM-DD (ET). Defaults to today in US/Eastern.
      required:
        - symbols
    SymbolSummaryItem:
      type: object
      properties:
        symbol:
          type: string
        shortName:
          type: ["string", "null"]
        exchange:
          type: ["string", "null"]
        currency:
          type: ["string", "null"]
        prevClose:
          type: ["number", "null"]
          description: Previous regular-session close (regularMarketPreviousClose)
        dayOpen:
          type: ["number", "null"]
        dayHigh:
          type: ["number", "null"]
        dayLow:
          type: ["number", "null"]
        dayClose:
          type: ["number", "null"]
          description: Most recent regular-session close price
        dayVolume:
          type: ["integer", "null"]
        intradayReturnPct:
          type: ["number", "null"]
          description: (dayClose / dayOpen - 1) * 100 — intraday move within the session
        vsPreClosePct:
          type: ["number", "null"]
          description: (dayClose / prevClose - 1) * 100 — overnight + intraday return vs prior close
        latestPrice:
          type: ["number", "null"]
          description: Most recent 1m bar close (pre/regular/after-hours)
        latestSession:
          type: ["string", "null"]
          enum: ["premarket", "regular", "afterhours", null]
          description: Session type of the most recent 1m bar
        latestChgPct:
          type: ["number", "null"]
          description: (latestPrice / dayClose - 1) * 100 — latest tick vs most recent regular-session close
        latestBarTimeEt:
          type: ["string", "null"]
          description: Timestamp of the latest 1m bar in ET
        vwapDate:
          type: ["string", "null"]
          description: ET date of the trading day used for VWAP calculation
        regularBarCount:
          type: ["integer", "null"]
          description: Number of regular-session 1m bars in the VWAP day
        intradayBarCount:
          type: ["integer", "null"]
          description: Total 1m bars fetched across all dates
        intradayVwapLast:
          type: ["number", "null"]
          description: Cumulative VWAP at end of regular session on vwapDate
        pctRegularMinutesAboveVwap:
          type: ["number", "null"]
          description: Percent of regular-session 1m bars where close > VWAP
        fetchError:
          type: ["string", "null"]
          description: Error message if this symbol failed to fetch
      required:
        - symbol
    BatchSummaryResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/SymbolSummaryItem"
        tradeDate:
          type: string
          description: The trade date used for this query (ET)
        fetchedAt:
          type: string
          description: ISO timestamp when the batch completed
      required:
        - results
        - tradeDate
        - fetchedAt
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
